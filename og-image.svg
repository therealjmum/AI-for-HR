<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0052ff"/>
      <stop offset="40%" style="stop-color:#3b74ff"/>
      <stop offset="100%" style="stop-color:#0052ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle blue glow top-left -->
  <ellipse cx="200" cy="200" rx="400" ry="300" fill="#0052ff" opacity="0.06" filter="url(#blur)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentLine)"/>

  <!-- Left border accent -->
  <rect x="60" y="60" width="3" height="510" fill="#0052ff" opacity="0.4"/>

  <!-- Logo: HR × AI -->
  <text x="96" y="118" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="-0.5">HR <tspan fill="#0052ff">x</tspan> AI</text>

  <!-- Tag pill -->
  <rect x="96" y="148" width="196" height="30" rx="3" fill="#0d1a3a" stroke="#0052ff" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="114" cy="163" r="4" fill="#0052ff"/>
  <text x="126" y="168" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#7ba8ff" letter-spacing="1.5">FOR HR LEADERS IN TECH</text>

  <!-- ── MAIN HEADLINE ── -->
  <text x="96" y="248" font-family="Arial, sans-serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-3">What you can</text>
  <text x="96" y="328" font-family="Arial, sans-serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-3"><tspan fill="#0052ff">build</tspan> with AI &#8212;</text>
  <text x="96" y="408" font-family="Arial, sans-serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-3">people edition.</text>

  <!-- ── DESCRIPTION ── -->
  <text x="96" y="458" font-family="Arial, sans-serif" font-size="19" font-weight="400" fill="#c0c0c0">30+ use cases &amp; ready-to-use prompts. Built for HR leaders in tech.</text>

  <!-- ── DIVIDER ── -->
  <line x1="96" y1="492" x2="700" y2="492" stroke="#1e1e1e" stroke-width="1"/>

  <!-- ── CATEGORY PILLS ── -->
  <rect x="96" y="510" width="100" height="26" rx="3" fill="#0d1a3a" stroke="#0052ff" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="112" cy="523" r="4" fill="#0052ff"/>
  <text x="122" y="528" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#7ba8ff" letter-spacing="0.8">TALENT</text>

  <rect x="208" y="510" width="148" height="26" rx="3" fill="#001a12" stroke="#00c896" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="224" cy="523" r="4" fill="#00c896"/>
  <text x="234" y="528" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#00c896" letter-spacing="0.8">COMP &amp; BENEFITS</text>

  <rect x="368" y="510" width="190" height="26" rx="3" fill="#1a0d3a" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="384" cy="523" r="4" fill="#7c3aed"/>
  <text x="394" y="528" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="0.8">EMPLOYEE EXPERIENCE</text>

  <rect x="570" y="510" width="112" height="26" rx="3" fill="#1a1200" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="586" cy="523" r="4" fill="#f59e0b"/>
  <text x="596" y="528" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fbbf24" letter-spacing="0.8">COMMS</text>

  <rect x="694" y="510" width="107" height="26" rx="3" fill="#001a1f" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="710" cy="523" r="4" fill="#06b6d4"/>
  <text x="720" y="528" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#22d3ee" letter-spacing="0.8">ANALYTICS</text>

  <rect x="813" y="510" width="135" height="26" rx="3" fill="#1a0000" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="829" cy="523" r="4" fill="#ef4444"/>
  <text x="839" y="528" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#f87171" letter-spacing="0.8">STRATEGY &amp; OPS</text>

  <!-- ── RIGHT SIDE: Stats card ── -->
  <rect x="820" y="148" width="300" height="300" rx="4" fill="#0f0f0f" stroke="#1e1e1e" stroke-width="1"/>
  <rect x="820" y="148" width="300" height="3" fill="#0052ff"/>

  <text x="860" y="220" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="-2">30<tspan fill="#0052ff">+</tspan></text>
  <text x="860" y="244" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#777777" letter-spacing="1">USE CASES</text>

  <line x1="840" y1="268" x2="1100" y2="268" stroke="#1e1e1e" stroke-width="1"/>

  <text x="860" y="322" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="-2">6<tspan fill="#0052ff">+</tspan></text>
  <text x="860" y="346" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#777777" letter-spacing="1">CATEGORIES</text>

  <line x1="840" y1="368" x2="1100" y2="368" stroke="#1e1e1e" stroke-width="1"/>

  <text x="860" y="420" font-family="Arial, sans-serif" font-size="27" font-weight="900" fill="#ffffff" letter-spacing="-1">READY-TO-USE</text>
  <text x="860" y="446" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#777777" letter-spacing="1">PROMPTS INCLUDED</text>

  <!-- ── URL / attribution ── -->
  <text x="96" y="590" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#555555">therealjmum.github.io/AI-for-HR</text>
  <text x="1104" y="590" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#0052ff" text-anchor="end">by jmum</text>

</svg>
