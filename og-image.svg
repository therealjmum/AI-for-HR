<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a3a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0052ff"/>
      <stop offset="40%" style="stop-color:#3b74ff"/>
      <stop offset="100%" style="stop-color:#0052ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle blue glow top-left -->
  <ellipse cx="200" cy="200" rx="400" ry="300" fill="#0052ff" opacity="0.06" filter="url(#blur)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="0" y1="629" x2="1200" y2="629" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentLine)"/>

  <!-- Left border accent -->
  <rect x="60" y="60" width="3" height="510" fill="#0052ff" opacity="0.4"/>

  <!-- ── NAV area ── -->
  <!-- Logo: HR × AI -->
  <text x="96" y="118" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="-0.5">HR <tspan fill="#0052ff">×</tspan> AI</text>

  <!-- Tag pill -->
  <rect x="96" y="148" width="196" height="30" rx="3" fill="#0d1a3a" stroke="#0052ff33" stroke-width="1"/>
  <!-- Pulsing dot -->
  <circle cx="114" cy="163" r="4" fill="#0052ff"/>
  <text x="126" y="168" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#7ba8ff" letter-spacing="1.5">FOR HR LEADERS IN TECH</text>

  <!-- ── MAIN HEADLINE ── -->
  <text x="96" y="248" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-3">What you can</text>
  <text x="96" y="328" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="900" letter-spacing="-3">
    <tspan fill="#0052ff">build</tspan>
    <tspan fill="#ffffff"> with AI —</tspan>
  </text>
  <text x="96" y="408" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-3">this week.</text>

  <!-- ── DESCRIPTION ── -->
  <text x="96" y="458" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="400" fill="#c0c0c0" letter-spacing="-0.2">30+ use cases &amp; ready-to-use prompts. Built for HR leaders in tech.</text>

  <!-- ── DIVIDER ── -->
  <line x1="96" y1="492" x2="700" y2="492" stroke="#1e1e1e" stroke-width="1"/>

  <!-- ── CATEGORY PILLS ── -->
  <!-- Talent -->
  <rect x="96" y="510" width="100" height="26" rx="3" fill="#0d1a3a" stroke="#0052ff44" stroke-width="1"/>
  <circle cx="112" cy="523" r="4" fill="#0052ff"/>
  <text x="122" y="528" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#7ba8ff" letter-spacing="0.8">TALENT</text>

  <!-- Comp -->
  <rect x="208" y="510" width="148" height="26" rx="3" fill="#001a12" stroke="#00c89644" stroke-width="1"/>
  <circle cx="224" cy="523" r="4" fill="#00c896"/>
  <text x="234" y="528" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#00c896" letter-spacing="0.8">COMP &amp; BENEFITS</text>

  <!-- Employee Exp -->
  <rect x="368" y="510" width="190" height="26" rx="3" fill="#1a0d3a" stroke="#7c3aed44" stroke-width="1"/>
  <circle cx="384" cy="523" r="4" fill="#7c3aed"/>
  <text x="394" y="528" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="0.8">EMPLOYEE EXPERIENCE</text>

  <!-- Comms -->
  <rect x="570" y="510" width="112" height="26" rx="3" fill="#1a1200" stroke="#f59e0b44" stroke-width="1"/>
  <circle cx="586" cy="523" r="4" fill="#f59e0b"/>
  <text x="596" y="528" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#fbbf24" letter-spacing="0.8">COMMS</text>

  <!-- Analytics -->
  <rect x="694" y="510" width="107" height="26" rx="3" fill="#001a1f" stroke="#06b6d444" stroke-width="1"/>
  <circle cx="710" cy="523" r="4" fill="#06b6d4"/>
  <text x="720" y="528" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#22d3ee" letter-spacing="0.8">ANALYTICS</text>

  <!-- Strategy -->
  <rect x="813" y="510" width="135" height="26" rx="3" fill="#1a0000" stroke="#ef444444" stroke-width="1"/>
  <circle cx="829" cy="523" r="4" fill="#ef4444"/>
  <text x="839" y="528" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#f87171" letter-spacing="0.8">STRATEGY &amp; OPS</text>

  <!-- ── RIGHT SIDE: Stats card ── -->
  <rect x="820" y="148" width="300" height="300" rx="4" fill="#0f0f0f" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Blue top stripe -->
  <rect x="820" y="148" width="300" height="3" rx="0" fill="#0052ff"/>

  <!-- Stat 1: 30+ use cases -->
  <text x="860" y="220" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="-2">30<tspan fill="#0052ff">+</tspan></text>
  <text x="860" y="244" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#777" letter-spacing="1">USE CASES</text>

  <line x1="840" y1="268" x2="1100" y2="268" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Stat 2: 6 categories -->
  <text x="860" y="322" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="-2">6<tspan fill="#0052ff">+</tspan></text>
  <text x="860" y="346" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#777" letter-spacing="1">CATEGORIES</text>

  <line x1="840" y1="368" x2="1100" y2="368" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Stat 3: Ready-to-use -->
  <text x="860" y="420" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="900" fill="#ffffff" letter-spacing="-1">READY-TO-USE</text>
  <text x="860" y="446" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#777" letter-spacing="1">PROMPTS INCLUDED</text>

  <!-- ── URL / attribution ── -->
  <text x="96" y="590" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#555" letter-spacing="0.3">therealjmum.github.io/AI-for-HR</text>
  <text x="1104" y="590" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0052ff" letter-spacing="0.3" text-anchor="end">💡 by jmum</text>

</svg>
